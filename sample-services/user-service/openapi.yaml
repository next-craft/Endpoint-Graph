openapi: "3.0.0"
info:
  title: User Service
  version: "1.0.0"
paths:
  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User object
  /users/profile:
    get:
      summary: Get current user profile
      responses:
        "200":
          description: Profile object
