openapi: "3.0.0"
info:
  title: Payment Service
  version: "1.0.0"
paths:
  /payments/charge:
    post:
      summary: Charge a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                amount:
                  type: number
      responses:
        "200":
          description: Charge result
  /payments/{id}:
    get:
      summary: Get payment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment object
